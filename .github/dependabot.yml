version: 2
updates:
  - package-ecosystem: npm
    directory: /
    open-pull-requests-limit: 20
    schedule:
      interval: weekly
      time: "05:00"
      timezone: Asia/Shanghai
    groups:
      # Nuxt 官方 ESLint 适配包是同一条配置链，宜锁步升级。
      nuxt-eslint:
        patterns:
          - "@nuxt/eslint"
          - "@nuxt/eslint-config"

      # Nuxt 测试运行时与 test-utils 需要匹配同一套测试适配层。
      nuxt-testing:
        patterns:
          - "@nuxt/test-utils"
          - "vitest-environment-nuxt"

      # VueUse Nuxt 模块直接包裹 VueUse core，升级时适合一起验证。
      vueuse:
        patterns:
          - "@vueuse/core"
          - "@vueuse/nuxt"

      # PrimeVue 主包、官方扩展和 PrimeUIX 底层包共享内部类型与主题能力。
      primevue-core:
        patterns:
          - "primevue"
          - "@primevue/*"
          - "@primeuix/*"

      # TypeScript、vue-tsc 与 typescript-eslint 共享 TS 版本兼容窗口。
      typescript-checking:
        patterns:
          - "typescript"
          - "vue-tsc"
          - "typescript-eslint"

      # Vitest、覆盖率插件与 happy-dom 属于同一测试执行栈。
      vitest-stack:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "happy-dom"

      # ESLint 主包、配置和核心插件存在直接 peer 约束。
      eslint-stack:
        patterns:
          - "eslint"
          - "eslint-plugin-vue"
          - "eslint-config-cmyr"
          - "@intlify/eslint-plugin-vue-i18n"

      # Stylelint 主包与配置包保持小粒度同步升级即可。
      stylelint-stack:
        patterns:
          - "stylelint"
          - "stylelint-config-cmyr"

      # Better Auth 主包、SSO 扩展与本地化包存在直接集成关系。
      better-auth:
        patterns:
          - "better-auth"
          - "@better-auth/*"
          - "better-auth-localization"

      # markdown-it 主包及其插件共享解析器扩展接口。
      markdown-it:
        patterns:
          - "markdown-it"
          - "@types/markdown-it"
          - "markdown-it-anchor"
          - "markdown-it-container"
          - "markdown-it-emoji"
          - "markdown-it-github-alerts"
          - "@types/markdown-it-container"
          - "@types/markdown-it-emoji"

      # Katex 只与 markdown-it-texmath 这条数学渲染链直接耦合。
      markdown-math:
        patterns:
          - "markdown-it-texmath"
          - "katex"
          - "@types/katex"

      # 邮件发送器与 MJML 模板编译链会一起参与邮件生成与投递。
      email-stack:
        patterns:
          - "nodemailer"
          - "@types/nodemailer"
          - "mjml"
          - "@types/mjml"

      # Playwright 三件套需要锁步升级，避免 runner、core 与 test API 版本错位。
      playwright:
        patterns:
          - "playwright"
          - "playwright-core"
          - "@playwright/test"

      # AWS S3 客户端与 presigner 共享 smithy 类型，拆开升级容易直接报错。
      aws-sdk-s3:
        patterns:
          - "@aws-sdk/client-s3"
          - "@aws-sdk/s3-request-presigner"
    ignore:
      # TypeScript 7.x 实验性 API，typescript-eslint 8.x 尚不兼容。等待 TS 7 稳定且
      # typescript-eslint 发布正式支持版本后再解除屏蔽。评估见 docs/design/governance/2026-07-22-dependency-upgrade-evaluation.md
      - dependency-name: "typescript"
        versions:
          - ">=7.0.0"

      # ESLint 10.x 移除了 sourceCode.getTokenOrCommentBefore API，导致
      # eslint-plugin-import@2.32.0 运行时崩溃。等待上游发版支持后再解除屏蔽。
      # 评估见 docs/design/governance/2026-07-22-dependency-upgrade-evaluation.md
      - dependency-name: "eslint"
        versions:
          - ">=10.0.0"

      # h3 v2 RC 与 Nuxt 4.x 运行时不兼容（Nuxt v5 才会统一使用 h3 v2）。
      # pnpm 解析到其他依赖的 h3 v2 RC 时，Nitro dev server 会生成
      # 调用 event.req.headers.get() 等 v2 风格 API 的代码，但运行时事件
      # 仍是 h3 v1 结构（Node IncomingMessage），导致 TypeError 崩溃。
      # 详情见 docs/design/governance/2026-07-22-h3-version-pinning.md
      - dependency-name: "h3"
        versions:
          - ">=2.0.0"
  - package-ecosystem: github-actions
    directory: /
    open-pull-requests-limit: 20
    schedule:
      interval: weekly
      time: "05:00"
      timezone: Asia/Shanghai
