name: Release
on:
  # push:
  #   branches:
  #     - master
  workflow_dispatch:
  schedule:
    # 每周六 UTC+0 12:00 即 UTC+8 20:00
    - cron: "0 12 * * 6"
# 仅针对当前工作流正在进行的作业或运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # Release 作业不取消，因为要确保版本发布成功
jobs:
  precheck:
    name: Pre-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "11.11.0"
      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "pnpm"
      - run: pnpm i --frozen-lockfile
      - name: Run shared CI pre-check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          ALIYUN_USERNAME: ${{ secrets.ALIYUN_USERNAME }}
          ALIYUN_PASSWORD: ${{ secrets.ALIYUN_PASSWORD }}
        run: pnpm run ci:precheck -- --profile=release
      - name: Upload pre-check artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-precheck-release
          path: |
            artifacts/review-gate/*-ci-precheck-release.md
            artifacts/review-gate/*-ci-precheck-release.json
          if-no-files-found: warn

  regression:
    name: Regression Gate
    needs: precheck
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      security-events: read
    steps:
      - uses: actions/checkout@v7
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "11.11.0"
      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "pnpm"
      - run: pnpm i --frozen-lockfile
      # Build api-client first so `nuxt typecheck` can resolve type declarations
      - name: Build api-client dependency
        run: pnpm --filter @momei-blog/api-client build
      - name: Run pre-release regression gate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run regression:pre-release
      - name: Upload regression gate artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: regression-pre-release
          path: |
            artifacts/review-gate/*-pre-release-regression.md
            artifacts/review-gate/*-pre-release-regression.json
            artifacts/review-gate/*-pre-release.md
          if-no-files-found: warn

  release:
    name: Release
    needs: regression
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      id-token: write          # OIDC for npm publish
      packages: write
      contents: write
      issues: write
      pull-requests: write
      security-events: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 0        # semantic-release 和 changesets 都需要完整 git 历史
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "11.11.0"
      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"
      - run: pnpm i --frozen-lockfile

      # 步骤 1：semantic-release — 根包版本 + CHANGELOG + GitHub Release
      - name: Semantic Release (root)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run release:semantic

      # 步骤 2：changeset publish — 子包版本 + CHANGELOG + npm publish
      - name: Build sub-packages
        run: pnpm -r --filter "./packages/*" build
      - name: Changeset Publish (packages)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 无需 NPM_TOKEN — 通过 OIDC 自动认证
        run: pnpm changeset publish

      # 步骤 3：Docker build — 基于 semantic-release 的 git tag
      # 发布到 docker
      - name: Get git tag
        id: git_tag
        run: |
          GIT_TAG=$(git describe --tags --exact-match HEAD 2>/dev/null || true)
          echo "tag=$GIT_TAG" >> ${GITHUB_OUTPUT}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Login to Alibaba Cloud Container Registry
        uses: docker/login-action@v4
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}
      - name: Extract Docker metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          # 发布到 docker.io / ghcr.io / registry.cn-hangzhou.aliyuncs.com
          images: |
            ${{ github.repository }}
            ghcr.io/${{ github.repository }}
            registry.cn-hangzhou.aliyuncs.com/${{ github.repository }}
          tags: |
            type=semver,priority=1100,pattern={{version}},value=${{ steps.git_tag.outputs.tag }},enable=true
            type=raw,value=latest,enable=true
            type=raw,value={{date 'YYYY-MM-DD' tz='Asia/Shanghai'}},enable=true
            type=sha,format=short,prefix=sha-,enable=true
          flavor: latest=false
      - name: Build and push Docker images
        uses: docker/build-push-action@v7
        # 如果有 GIT_TAG ，就发布
        if: ${{ steps.git_tag.outputs.tag != '' }}
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
