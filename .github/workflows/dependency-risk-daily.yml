name: Daily Dependency Risk Audit

on:
  schedule:
    # 每天 UTC 00:15，即北京时间 08:15
    - cron: "15 0 * * *"
  workflow_dispatch:

concurrency:
  group: dependency-risk-daily-${{ github.ref }}
  cancel-in-progress: false

jobs:
  audit:
    name: Dependency Risk Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Prepare report paths
        id: paths
        shell: bash
        run: |
          REPORT_DIR="artifacts/security/daily-dependency-audit/${GITHUB_RUN_ID}"
          mkdir -p "$REPORT_DIR"
          echo "report_dir=$REPORT_DIR" >> "$GITHUB_OUTPUT"
          echo "summary_json=$REPORT_DIR/summary.json" >> "$GITHUB_OUTPUT"
          echo "summary_md=$REPORT_DIR/summary.md" >> "$GITHUB_OUTPUT"

      - name: Run daily dependency audit
        run: >-
          pnpm run security:audit-deps:daily --
          --mode=warn
          --output-json=${{ steps.paths.outputs.summary_json }}
          --output-markdown=${{ steps.paths.outputs.summary_md }}
          --run-url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Publish workflow summary
        shell: bash
        run: cat "${{ steps.paths.outputs.summary_md }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Capture audit status
        id: audit_status
        shell: bash
        run: |
          STATUS=$(node -e "const fs=require('fs');const data=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));process.stdout.write(data.status)" "${{ steps.paths.outputs.summary_json }}")
          CONCLUSION=$(node -e "const fs=require('fs');const data=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));process.stdout.write(data.conclusion)" "${{ steps.paths.outputs.summary_json }}")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "conclusion=$CONCLUSION" >> "$GITHUB_OUTPUT"

      - name: Upload audit artifact
        uses: actions/upload-artifact@v7
        with:
          name: dependency-risk-daily-${{ github.run_id }}
          path: ${{ steps.paths.outputs.report_dir }}
          if-no-files-found: error
          retention-days: 30

      - name: Sync alert issues
        id: notify_issue
        continue-on-error: true
        uses: actions/github-script@v8
        env:
          SUMMARY_JSON: ${{ steps.paths.outputs.summary_json }}
        with:
          script: |
            const fs = require('fs')
            const { pathToFileURL } = require('node:url')
            const summary = JSON.parse(fs.readFileSync(process.env.SUMMARY_JSON, 'utf8'))
            const helperModulePath = pathToFileURL(`${process.env.GITHUB_WORKSPACE}/scripts/security/daily-dependency-risk-issue.mjs`).href
            const {
              buildDailyDependencyRiskIssueBody,
              buildDailyDependencyRiskIssueTitle,
              collectStaleDailyDependencyRiskIssueNumbers,
              pickDailyDependencyRiskIssueForTitle,
            } = await import(helperModulePath)
            const title = buildDailyDependencyRiskIssueTitle(summary)
            const body = buildDailyDependencyRiskIssueBody(summary)

            const { owner, repo } = context.repo
            const existingIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'all',
              per_page: 100,
            })
            let activeIssueNumber = null

            if (summary.status !== 'clean') {
              const existingIssue = pickDailyDependencyRiskIssueForTitle(existingIssues, title)

              if (existingIssue) {
                const updated = await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: existingIssue.number,
                  title,
                  state: 'open',
                  body,
                })
                activeIssueNumber = updated.data.number
                core.setOutput('issue_url', updated.data.html_url)
                core.setOutput('action', 'updated')
              } else {
                const created = await github.rest.issues.create({
                  owner,
                  repo,
                  title,
                  body,
                })
                activeIssueNumber = created.data.number
                core.setOutput('issue_url', created.data.html_url)
                core.setOutput('action', 'created')
              }
            } else {
              core.setOutput('action', 'clean')
            }

            const staleIssueNumbers = collectStaleDailyDependencyRiskIssueNumbers(existingIssues, activeIssueNumber)

            for (const issueNumber of staleIssueNumbers) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issueNumber,
                state: 'closed',
              })
            }

            core.setOutput('closed_count', String(staleIssueNumbers.length))

      - name: Record notification fallback
        if: steps.notify_issue.outcome == 'failure'
        shell: bash
        run: |
          {
            echo ''
            echo '## Issue 同步降级'
              echo '- GitHub issue 告警创建、更新或历史 issue 关闭未成功，已回退到 failed workflow + uploaded artifact 作为最小可用追溯基线。'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail on risky or failed audit
        if: steps.audit_status.outputs.status != 'clean'
        run: |
          echo "Dependency audit requires attention: ${{ steps.audit_status.outputs.conclusion }}"
          exit 1
