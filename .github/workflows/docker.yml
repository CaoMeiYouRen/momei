name: Publish Docker Image

on:
  workflow_dispatch:
  push:
    branches:
      - master

# 仅取消针对当前工作流正在进行的作业或运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  precheck:
    name: Pre-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "11.11.0"
      - name: Setup Node.js@lts environment
        uses: actions/setup-node@v7
        with:
          node-version: "lts/*"
          cache: "pnpm"
      - run: pnpm i --frozen-lockfile
      - name: Run shared CI pre-check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          ALIYUN_USERNAME: ${{ secrets.ALIYUN_USERNAME }}
          ALIYUN_PASSWORD: ${{ secrets.ALIYUN_PASSWORD }}
        run: pnpm run ci:precheck -- --profile=docker
      - name: Upload pre-check artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-precheck-docker
          path: |
            artifacts/review-gate/*-ci-precheck-docker.md
            artifacts/review-gate/*-ci-precheck-docker.json
          if-no-files-found: warn

  qa:
    name: QA
    needs: precheck
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "11.11.0"
      - name: Setup Node.js@lts environment
        uses: actions/setup-node@v7
        with:
          node-version: "lts/*"
          cache: "pnpm"
      - run: pnpm i --frozen-lockfile
      # Build api-client first so nuxt typecheck resolves its type declarations
      - name: Build api-client dependency
        run: pnpm --filter @momei-blog/api-client build
      - name: Build mcp-server dependency
        run: pnpm --filter momei-mcp-server build
      - run: pnpm run lint
      - run: pnpm run lint:i18n
      - run: pnpm run lint:css
      - run: pnpm run typecheck
  unit:
    name: Unit
    needs: precheck
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "11.11.0"
      - name: Setup Node.js@lts environment
        uses: actions/setup-node@v7
        with:
          node-version: "lts/*"
          cache: "pnpm"
      - run: pnpm i --frozen-lockfile
      # Build api-client + mcp-server first so dependent packages can resolve them
      - name: Build api-client dependency
        run: pnpm --filter @momei-blog/api-client build
      - name: Build mcp-server dependency
        run: pnpm --filter momei-mcp-server build
      - run: pnpm run test
  build:
    needs: [qa, unit]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Lowercase the repo name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}
      - name: Get short commit hash
        run: echo "TAG=sha-${GITHUB_SHA::7}" >>${GITHUB_ENV}
      # ── 原生多架构构建 ─────────────────────────────────────
      # 直接使用原始 Dockerfile，让 Buildx + QEMU 在各目标平台上
      # 完整执行 pnpm install → build，确保原生模块（如 better-sqlite3）
      # 针对各架构正确编译，避免预构建 x86_64 产物跨平台兼容问题。
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Login to Alibaba Cloud Container Registry
        uses: docker/login-action@v4
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}
      - name: Extract Docker metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          # 发布到 docker.io / ghcr.io / registry.cn-hangzhou.aliyuncs.com
          images: |
            ${{ github.repository }}
            ghcr.io/${{ github.repository }}
            registry.cn-hangzhou.aliyuncs.com/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=true
            type=raw,value={{date 'YYYY-MM-DD' tz='Asia/Shanghai'}},enable=true
            type=sha,format=short,prefix=sha-,enable=true
          flavor: latest=false
      - name: Build and push Docker images
        uses: docker/build-push-action@v7
        with:
          # 使用原始 Dockerfile，Buildx + QEMU 为各平台原生编译
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Docker Hub README & description sync
        uses: meeDamian/sync-readme@v1.0.6
        with:
          user: ${{ secrets.DOCKER_USERNAME }}
          pass: ${{ secrets.DOCKER_PASSWORD }}
          slug: ${{ github.repository }}
          description: "墨梅博客-AI驱动、原生国际化的开发者博客平台"
      # - name: Deploy to Jenkins
      #   if: ${{ github.repository == 'CaoMeiYouRen/momei' }}
      #   run: curl -X GET -L --user ${{ secrets.JENKINS_TOKEN }} "${{ secrets.JENKINS_URL }}/job/momei/buildWithParameters?token=${{ secrets.JENKINS_JOB_TOKEN }}&DOCKER_IMAGE=registry.cn-hangzhou.aliyuncs.com/${{ env.REPO }}:${{ env.TAG }}"
      - name: Deploy Demo to Jenkins
        if: ${{ github.repository == 'CaoMeiYouRen/momei' }}
        run: curl -X GET -L --user ${{ secrets.JENKINS_DEMO_TOKEN }} "${{secrets.JENKINS_DEMO_URL}}/job/momei-demo/buildWithParameters?token=${{secrets.JENKINS_DEMO_JOB_TOKEN }}&DOCKER_IMAGE=${{ env.REPO }}:${{env.TAG }}"
