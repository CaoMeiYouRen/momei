name: Publish Docker Image

on:
  workflow_dispatch:
  push:
    branches:
      - master

# 仅取消针对当前工作流正在进行的作业或运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  precheck:
    name: Pre-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "11.11.0"
      - name: Setup Node.js@lts environment
        uses: actions/setup-node@v7
        with:
          node-version: "lts/*"
          cache: "pnpm"
      - run: pnpm i --frozen-lockfile
      - name: Run shared CI pre-check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          ALIYUN_USERNAME: ${{ secrets.ALIYUN_USERNAME }}
          ALIYUN_PASSWORD: ${{ secrets.ALIYUN_PASSWORD }}
        run: pnpm run ci:precheck -- --profile=docker
      - name: Upload pre-check artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-precheck-docker
          path: |
            artifacts/review-gate/*-ci-precheck-docker.md
            artifacts/review-gate/*-ci-precheck-docker.json
          if-no-files-found: warn

  qa:
    name: QA
    needs: precheck
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "11.11.0"
      - name: Setup Node.js@lts environment
        uses: actions/setup-node@v7
        with:
          node-version: "lts/*"
          cache: "pnpm"
      - run: pnpm i --frozen-lockfile
      # Build api-client first so nuxt typecheck resolves its type declarations
      - name: Build api-client dependency
        run: pnpm --filter @momei-blog/api-client build
      - name: Build mcp-server dependency
        run: pnpm --filter momei-mcp-server build
      - run: pnpm run lint
      - run: pnpm run lint:i18n
      - run: pnpm run lint:css
      - run: pnpm run typecheck
      - run: pnpm run build
      - name: Upload Nuxt build output for Docker reuse
        uses: actions/upload-artifact@v7
        with:
          name: nuxt-output-docker
          path: .output/
          include-hidden-files: true
  unit:
    name: Unit
    needs: precheck
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "11.11.0"
      - name: Setup Node.js@lts environment
        uses: actions/setup-node@v7
        with:
          node-version: "lts/*"
          cache: "pnpm"
      - run: pnpm i --frozen-lockfile
      # Build api-client + mcp-server first so dependent packages can resolve them
      - name: Build api-client dependency
        run: pnpm --filter @momei-blog/api-client build
      - name: Build mcp-server dependency
        run: pnpm --filter momei-mcp-server build
      - run: pnpm run test
  e2e:
    name: E2E
    needs: precheck
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "11.11.0"
      - name: Setup Node.js@lts environment
        uses: actions/setup-node@v7
        with:
          node-version: "lts/*"
          cache: "pnpm"
      - run: pnpm i --frozen-lockfile
      - name: Build api-client dependency
        run: pnpm --filter @momei-blog/api-client build
      - name: Build mcp-server dependency
        run: pnpm --filter momei-mcp-server build
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
      - name: Run E2E tests
        env:
          TEST_MODE: "true"
          NUXT_PUBLIC_TEST_MODE: "true"
          AUTH_SECRET: ${{ secrets.E2E_AUTH_SECRET || 'ci-e2e-test-secret-for-better-auth' }}
          BETTER_AUTH_SECRET: ${{ secrets.E2E_AUTH_SECRET || 'ci-e2e-test-secret-for-better-auth' }}
          FORCE_E2E_BUILD: "true"
        run: pnpm run test:e2e

  build:
    needs: [qa, unit] # 等待 QA 和 Unit 执行成功（E2E 较长，不影响 Docker 发布）
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Lowercase the repo name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}
      - name: Get short commit hash
        run: echo "TAG=sha-${GITHUB_SHA::7}" >>${GITHUB_ENV}
      # ── 复用 QA 构建产物 ──────────────────────────────────
      # qa job 已经完成 Nuxt 构建并上传 nuxt-output-docker，
      # 此处下载后通过 Dockerfile.ci 跳过 Dockerfile 内的源码构建阶段，
      # 避免同一应用在 CI 中被重复构建两次。
      - name: Download prebuilt Nuxt output
        id: download-nuxt
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          name: nuxt-output-docker
          path: .output/
          include-hidden-files: true
      - name: Prepare Docker context with prebuilt output
        shell: bash
        run: |
          # 从原始 Dockerfile 提取基础镜像名
          NODEJS_IMAGE="$(grep 'FROM.*AS nodejs' Dockerfile | head -1 | awk '{print $2}')"
          RUNTIME_IMAGE="$(grep 'FROM.*AS runtime' Dockerfile | head -1 | awk '{print $2}')"

          # 创建临时构建上下文目录
          mkdir -p .docker-context

          # 写入预构建产物的 Dockerfile（跳过源码构建阶段）
          cat > .docker-context/Dockerfile << 'DOCKERFILE_INNER'
          FROM __NODEJS_IMAGE__ AS nodejs
          FROM __RUNTIME_IMAGE__ AS runtime

          FROM nodejs AS docker-minifier
          WORKDIR /app
          COPY .output ./.output

          FROM runtime
          ENV NODE_ENV=production
          WORKDIR /app
          COPY --from=docker-minifier /app /app
          EXPOSE 3000
          CMD ["node", ".output/server/index.mjs"]
          DOCKERFILE_INNER

          # 替换占位符为真实镜像名
          sed -i "s|__NODEJS_IMAGE__|${NODEJS_IMAGE}|g" .docker-context/Dockerfile
          sed -i "s|__RUNTIME_IMAGE__|${RUNTIME_IMAGE}|g" .docker-context/Dockerfile

          # 将预构建产物复制到上下文中
          cp -r .output .docker-context/.output

          echo "Docker context prepared at .docker-context/"
          ls -la .docker-context/
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Login to Alibaba Cloud Container Registry
        uses: docker/login-action@v4
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}
      - name: Extract Docker metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          # 发布到 docker.io / ghcr.io / registry.cn-hangzhou.aliyuncs.com
          images: |
            ${{ github.repository }}
            ghcr.io/${{ github.repository }}
            registry.cn-hangzhou.aliyuncs.com/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=true
            type=raw,value={{date 'YYYY-MM-DD' tz='Asia/Shanghai'}},enable=true
            type=sha,format=short,prefix=sha-,enable=true
          flavor: latest=false
      - name: Build and push Docker images
        uses: docker/build-push-action@v7
        with:
          context: .docker-context
          file: .docker-context/Dockerfile
          # 推送到 dockerhub / ghcr.io / 阿里云
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Docker Hub README & description sync
        uses: meeDamian/sync-readme@v1.0.6
        with:
          user: ${{ secrets.DOCKER_USERNAME }}
          pass: ${{ secrets.DOCKER_PASSWORD }}
          slug: ${{ github.repository }}
          description: "墨梅博客-AI驱动、原生国际化的开发者博客平台"
      # - name: Deploy to Jenkins
      #   if: ${{ github.repository == 'CaoMeiYouRen/momei' }}
      #   run: curl -X GET -L --user ${{ secrets.JENKINS_TOKEN }} "${{ secrets.JENKINS_URL }}/job/momei/buildWithParameters?token=${{ secrets.JENKINS_JOB_TOKEN }}&DOCKER_IMAGE=registry.cn-hangzhou.aliyuncs.com/${{ env.REPO }}:${{ env.TAG }}"
      - name: Deploy Demo to Jenkins
        if: ${{ github.repository == 'CaoMeiYouRen/momei' }}
        run: curl -X GET -L --user ${{ secrets.JENKINS_DEMO_TOKEN }} "${{secrets.JENKINS_DEMO_URL}}/job/momei-demo/buildWithParameters?token=${{secrets.JENKINS_DEMO_JOB_TOKEN }}&DOCKER_IMAGE=${{ env.REPO }}:${{env.TAG }}"
