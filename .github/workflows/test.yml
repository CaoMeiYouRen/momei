name: Test
# ⚠️ upload-artifact 注意：actions/upload-artifact@v4+（2024-09 起）默认排除隐藏文件（以 . 开头）。
# Nuxt 的 .output/、.nuxt/ 等目录属于隐藏目录，上传时必须加 include-hidden-files: true。
# 详见 https://github.com/actions/upload-artifact/issues/602
# 另见 .session/wisdom.md 2026-07-23 条目
on:
  push:
    branches:
      - master
      - test
      - fix
      - docs
      - dev
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

# concurrency:
#   group: ${{ github.workflow }}-${{ github.ref }}
#   cancel-in-progress: false

jobs:
  # ===============================================================
  #  Shared Build — produces all build artifacts consumed downstream
  # ===============================================================
  build:
    name: Build (shared)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "11.11.0"
      - name: Setup Node.js@lts environment
        uses: actions/setup-node@v7
        with:
          node-version: "lts/*"
          cache: "pnpm"
      - run: pnpm i --frozen-lockfile
      # 构建依赖链：api-client → mcp-server → Nuxt（Nuxt 构建需要 mcp-server 产物）
      - name: Build api-client dependency
        run: pnpm --filter @momei-blog/api-client build
      - name: Build mcp-server dependency
        run: pnpm --filter momei-mcp-server build
      - name: Build Nuxt
        run: pnpm run build
      - name: Upload api-client dist
        uses: actions/upload-artifact@v7
        with:
          name: dist-api-client
          path: packages/api-client/dist/
      - name: Upload mcp-server dist
        uses: actions/upload-artifact@v7
        with:
          name: dist-mcp-server
          path: packages/mcp-server/dist/
      # include-hidden-files: true 必需 — .output/ 以点开头，upload-artifact v4+ 默认排除隐藏文件
      # 参见 https://github.com/actions/upload-artifact/issues/602
      - name: Upload Nuxt build output
        uses: actions/upload-artifact@v7
        with:
          name: nuxt-output
          path: .output/
          include-hidden-files: true
      - name: Debug — verify .output/
        shell: bash
        run: ls -la .output/ && ls -la .output/server/

  # ===============================================================
  #  Lint & Typecheck
  # ===============================================================
  test:
    name: Test
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "11.11.0"
      - name: Setup Node.js@lts environment
        uses: actions/setup-node@v7
        with:
          node-version: "lts/*"
          cache: "pnpm"
      - run: pnpm i --frozen-lockfile
      - name: Download api-client dist
        uses: actions/download-artifact@v7
        with:
          name: dist-api-client
          path: packages/api-client/dist/
      - name: Download mcp-server dist
        uses: actions/download-artifact@v7
        with:
          name: dist-mcp-server
          path: packages/mcp-server/dist/
      - run: pnpm run lint
      - run: pnpm run lint:i18n
      - run: pnpm run lint:css
      - run: pnpm run typecheck

  # ===============================================================
  #  Unit Tests
  # ===============================================================
  unit:
    name: Unit
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "11.11.0"
      - name: Setup Node.js@lts environment
        uses: actions/setup-node@v7
        with:
          node-version: "lts/*"
          cache: "pnpm"
      - run: pnpm i --frozen-lockfile
      - name: Download api-client dist
        uses: actions/download-artifact@v7
        with:
          name: dist-api-client
          path: packages/api-client/dist/
      - name: Download mcp-server dist
        uses: actions/download-artifact@v7
        with:
          name: dist-mcp-server
          path: packages/mcp-server/dist/
      - run: pnpm run test

  # ===============================================================
  #  Coverage
  # ===============================================================
  coverage:
    name: Coverage
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "11.11.0"
      - name: Setup Node.js@lts environment
        uses: actions/setup-node@v7
        with:
          node-version: "lts/*"
          cache: "pnpm"
      - run: pnpm i --frozen-lockfile
      - name: Download api-client dist
        uses: actions/download-artifact@v7
        with:
          name: dist-api-client
          path: packages/api-client/dist/
      - name: Download mcp-server dist
        uses: actions/download-artifact@v7
        with:
          name: dist-mcp-server
          path: packages/mcp-server/dist/
      - run: pnpm run test:coverage
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # ===============================================================
  #  E2E — Matrix Shards
  # ===============================================================
  e2e:
    name: E2E (${{ matrix.shard }}/4)
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v7
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "11.11.0"
      - name: Setup Node.js@lts environment
        uses: actions/setup-node@v7
        with:
          node-version: "lts/*"
          cache: "pnpm"
      - run: pnpm i --frozen-lockfile
      - name: Download Nuxt build output
        id: download-nuxt
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          name: nuxt-output
          path: .output/
      - name: Build Nuxt (fallback)
        if: steps.download-nuxt.outcome == 'failure' || steps.download-nuxt.outcome == 'skipped'
        run: pnpm run build
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
      - name: Run E2E tests (shard ${{ matrix.shard }}/4)
        env:
          TEST_MODE: "true"
          NUXT_PUBLIC_TEST_MODE: "true"
          AUTH_SECRET: ${{ secrets.E2E_AUTH_SECRET || 'ci-e2e-test-secret-for-better-auth' }}
          BETTER_AUTH_SECRET: ${{ secrets.E2E_AUTH_SECRET || 'ci-e2e-test-secret-for-better-auth' }}
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/4
      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-blob-report-${{ matrix.shard }}
          path: test-results/
          retention-days: 7

  # ===============================================================
  #  Merge E2E Reports (runs after all shards complete)
  # ===============================================================
  e2e-report:
    name: E2E Report
    if: always()
    needs: [e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "11.11.0"
      - name: Setup Node.js@lts environment
        uses: actions/setup-node@v7
        with:
          node-version: "lts/*"
          cache: "pnpm"
      - run: pnpm i --frozen-lockfile
      - name: Download all blob reports
        uses: actions/download-artifact@v7
        with:
          pattern: e2e-blob-report-*
          merge-multiple: true
          path: test-results/
      - name: Merge E2E reports
        run: pnpm exec playwright merge-reports --reporter html ./test-results/blob-report
      - name: Upload merged HTML report
        uses: actions/upload-artifact@v7
        with:
          name: e2e-html-report
          path: playwright-report/
          retention-days: 14

  # ===============================================================
  #  Lighthouse CI (reuses shared Nuxt build)
  # ===============================================================
  build-lighthouse:
    name: Build & Lighthouse
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "11.11.0"
      - name: Setup Node.js@lts environment
        uses: actions/setup-node@v7
        with:
          node-version: "lts/*"
          cache: "pnpm"
      - run: pnpm i --frozen-lockfile
      - name: Download Nuxt build output
        id: download-nuxt-lh
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          name: nuxt-output
          path: .output/
      - name: Build Nuxt (fallback)
        if: steps.download-nuxt-lh.outcome == 'failure' || steps.download-nuxt-lh.outcome == 'skipped'
        run: pnpm run build
      - name: Download bundle baseline report (master)
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@v21
        with:
          workflow: test.yml
          branch: master
          name: bundle-baseline-report
          path: .lighthouseci
          if_no_artifact_found: warn
          search_artifacts: true
      - name: Run Bundle Budget Check (MVP)
        shell: bash
        run: |
          BASELINE=".github/perf/bundle-baseline.json"
          if [ -f ".lighthouseci/bundle-baseline-report.json" ]; then
            BASELINE=".lighthouseci/bundle-baseline-report.json"
          fi
          echo "Using baseline: ${BASELINE}"
          pnpm exec node scripts/perf/check-bundle-budget.mjs --mode=warn --output=.lighthouseci/bundle-budget-report.json --baseline="${BASELINE}"
      - name: Run Lighthouse CI
        run: pnpm exec lhci autorun
        env:
          NUXT_PUBLIC_DEMO_MODE: true
          NUXT_PUBLIC_TEST_MODE: true
          TEST_MODE: true
          MOMEI_INSTALLED: true
          PORT: 3000
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
      - name: Upload bundle budget report
        uses: actions/upload-artifact@v7
        with:
          name: bundle-budget-report
          path: .lighthouseci/bundle-budget-report.json
          if-no-files-found: warn
      - name: Upload bundle baseline report (master)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v7
        with:
          name: bundle-baseline-report
          path: .lighthouseci/bundle-budget-report.json
          overwrite: true
          if-no-files-found: warn

  # ===============================================================
  #  API Client — tests only (build reused from shared build)
  # ===============================================================
  api-client:
    name: API Client Test
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/api-client
    steps:
      - uses: actions/checkout@v7
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "11.11.0"
      - name: Setup Node.js@lts environment
        uses: actions/setup-node@v7
        with:
          node-version: "lts/*"
          cache: "pnpm"
      - run: pnpm i --frozen-lockfile
      - name: Download api-client dist
        uses: actions/download-artifact@v7
        with:
          name: dist-api-client
          path: ${{ github.workspace }}/packages/api-client/dist/
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run test
      # build 已由共享 build job 完成，此处跳过

  # ===============================================================
  #  CLI (depends on api-client tests passing)
  # ===============================================================
  cli:
    name: CLI Test
    needs: [api-client]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/cli
    steps:
      - uses: actions/checkout@v7
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "11.11.0"
      - name: Setup Node.js@lts environment
        uses: actions/setup-node@v7
        with:
          node-version: "lts/*"
          cache: "pnpm"
      - run: pnpm i --frozen-lockfile
      - name: Download api-client dist
        uses: actions/download-artifact@v7
        with:
          name: dist-api-client
          path: ${{ github.workspace }}/packages/api-client/dist/
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run test
      - run: pnpm run build

  # ===============================================================
  #  MCP Server (depends on api-client tests passing)
  # ===============================================================
  mcp-server:
    name: MCP Test
    needs: [api-client]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/mcp-server
    steps:
      - uses: actions/checkout@v7
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "11.11.0"
      - name: Setup Node.js@lts environment
        uses: actions/setup-node@v7
        with:
          node-version: "lts/*"
          cache: "pnpm"
      - run: pnpm i --frozen-lockfile
      - name: Download api-client dist
        uses: actions/download-artifact@v7
        with:
          name: dist-api-client
          path: ${{ github.workspace }}/packages/api-client/dist/
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run test
      - run: pnpm run build
